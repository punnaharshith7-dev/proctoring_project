<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | Secure Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='tilt-effects.css') }}">
    <script src="{{ url_for('static', filename='tilt-effects.js') }}" defer></script>
    <style>
        :root {
            --primary: #23a6d5;
            --secondary: #23d5ab;
            --danger: #e73c7e;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

        /* --- Shifting Gradient Animation --- */
        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
        }

        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .reset-card {
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 25px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            text-align: center;
            backdrop-filter: blur(10px);
        }

        h2 { color: #333; margin-bottom: 10px; font-weight: 600; }
        p { font-size: 0.85rem; color: #666; margin-bottom: 25px; }

        input {
            width: 100%;
            padding: 13px 15px;
            margin: 10px 0;
            border: 1px solid #edf2f7;
            border-radius: 12px;
            background: #f8faff;
            outline: none;
            transition: 0.3s;
        }

        input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(35, 166, 213, 0.1); }

        /* --- Strength Meter --- */
        .meter-container { height: 6px; background: #eee; border-radius: 3px; margin: 5px 0 10px 0; overflow: hidden; }
        #strength-bar { height: 100%; width: 0%; transition: 0.3s; background: var(--danger); }

        .btn-reset {
            width: 100%;
            padding: 15px;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            color: white;
            border: none;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(35, 166, 213, 0.2);
            margin-top: 15px;
            text-transform: uppercase;
            transition: 0.3s;
        }

        .btn-reset:hover { transform: translateY(-2px); box-shadow: 0 15px 25px rgba(35, 166, 213, 0.3); }

        .back-link { margin-top: 20px; display: block; color: var(--primary); text-decoration: none; font-size: 0.85rem; font-weight: 600; }
        
        .msg { padding: 10px; border-radius: 8px; margin-bottom: 15px; font-size: 0.85rem; }
        .error { background: #ffe0e0; color: #ff4757; }
        body.page-ready { opacity: 1; transform: translateY(0); }
        body.page-exit { opacity: 0; transform: translateY(8px); }
        body { transition: opacity 0.28s ease, transform 0.28s ease; }
        @media (prefers-reduced-motion: reduce) {
            body, body.page-ready, body.page-exit { transition: none; transform: none; opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="reset-card">
        <span style="font-size: 40px; display: block; margin-bottom: 10px;">🔑</span>
        <h2>Forgot Password?</h2>
        <p>Verify your identity using your Roll Number and registered Phone Number.</p>

        {% if error %}
        <div class="msg error">⚠️ {{ error }}</div>
        {% endif %}

        <form action="/forgot_password" method="POST">
            <input type="text" name="userid" id="userid" maxlength="10" placeholder="Roll Number (10 characters)" required>
            <input type="text" name="phone" placeholder="Registered Phone Number" required>
            
            <hr style="border: 0; border-top: 1px solid #eee; margin: 15px 0;">
            
            <input type="password" id="password" name="new_password" placeholder="Enter New Password" oninput="checkStrength(this.value)" required>
            <div class="meter-container"><div id="strength-bar"></div></div>
            
            <button type="submit" class="btn-reset">RESET PASSWORD</button>
        </form>

        <a href="/login" class="back-link">← Back to Login</a>
    </div>

    <script>
        // --- ROLL NUMBER HELPER (10-char Alphanumeric) ---
        document.getElementById('userid').oninput = function() {
            // Converts input to uppercase and removes non-alphanumeric chars
            this.value = this.value.toUpperCase().replace(/[^A-Z0-9]/g, '');
        };

        // --- PASSWORD STRENGTH METER ---
        function checkStrength(pwd) {
            let strength = 0;
            if (pwd.length >= 8) strength += 25;
            if (/[A-Z]/.test(pwd)) strength += 25;
            if (/[0-9]/.test(pwd)) strength += 25;
            if (/[^A-Za-z0-9]/.test(pwd)) strength += 25;
            
            const bar = document.getElementById('strength-bar');
            bar.style.width = strength + "%";
            bar.style.background = strength < 50 ? "#e73c7e" : (strength < 100 ? "#f1c40f" : "#23d5ab");
        }
    </script>
    <script>
        (function () {
            const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
            const enterPage = () => {
                document.body.classList.add('page-ready');
                document.body.classList.remove('page-exit');
            };
            window.transitionTo = function (url) {
                if (!url) return;
                if (reduceMotion) { window.location.href = url; return; }
                document.body.classList.remove('page-ready');
                document.body.classList.add('page-exit');
                setTimeout(() => { window.location.href = url; }, 220);
            };
            document.addEventListener('click', (event) => {
                const link = event.target.closest('a[href]');
                if (!link) return;
                const href = link.getAttribute('href') || '';
                if (!href || href.startsWith('#') || link.target === '_blank' || event.metaKey || event.ctrlKey || event.shiftKey || event.altKey) return;
                const absoluteUrl = new URL(link.href, window.location.href);
                if (absoluteUrl.origin !== window.location.origin) return;
                event.preventDefault();
                transitionTo(absoluteUrl.href);
            });
            window.addEventListener('pageshow', enterPage);
            if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', enterPage);
            else enterPage();
        })();
    </script>
</body>
</html>
